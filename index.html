body{background:#050b18;font-family:Arial,sans-serif;color:#e2e8f0;padding:20px;min-height:100vh}

.btn-green{display:block;width:100%;padding:16px;margin-top:12px;background:linear-gradient(135deg,#22c55e,#16a34a);border:none;border-radius:12px;color:#fff;font-size:18px;font-weight:700;cursor:pointer}

.hide{display:none!important}
